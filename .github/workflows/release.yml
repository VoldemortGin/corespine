# Release → PyPI via Trusted Publishing (OIDC — NO stored token / secret).
#
# 与家族 ragspine / pdfspine 的发布模型对齐:发布 GitHub Release 时触发,`gate` 跑与 ci.yml
# 同形的质量门(ruff + mypy --strict + pytest,跨 3.10/3.11/3.12),全绿后 `publish` 才
# build sdist + wheel 并上传 `corespine` 分发包。发布版本以 pyproject.toml 的 version 为准
# (与 tag 保持同步),不从 tag 推导。
#
# ── 一次性 PyPI 设置(网页端,需账号登录;在 `corespine` 项目首次发布前用 pending publisher)──
#   PyPI → 账号 → Publishing → "Add a pending publisher":
#     Owner: VoldemortGin   Repository: corespine   Workflow: release.yml   Environment: (留空)
#     Project name: corespine
#   首发后该 pending publisher 自动转为项目的 trusted publisher。配置完成前 `publish` 会以
#   "not authorized" 失败——在此之前本 workflow 实质 dormant(不发 Release 即不触发)。
#
# ── 切一个 release ───────────────────────────────────────────────────────────────────
# 在 pyproject.toml bump `version`,提交,然后发布一个 GitHub Release(tag 如 v0.1.0)。
name: Release

on:
  release:
    types: [published]

jobs:
  gate:
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv (+ Python ${{ matrix.python-version }})
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install (editable + dev)
        run: uv pip install --system -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check src tests benchmarks

      - name: Typecheck (mypy --strict)
        run: mypy

      - name: Test (pytest)
        run: pytest -q

  publish:
    needs: gate
    runs-on: ubuntu-latest
    permissions:
      id-token: write # OIDC — Trusted Publishing 所需。
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install -U build
          python -m build
      - name: Publish to PyPI (Trusted Publishing / OIDC)
        uses: pypa/gh-action-pypi-publish@release/v1
